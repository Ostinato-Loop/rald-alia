name: RALD ALIA CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PNPM_VERSION: '9'
  NODE_VERSION: '20'
  AWS_REGION: eu-west-1
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.eu-west-1.amazonaws.com
  ECR_REPOSITORY_PREFIX: rald-alia

jobs:

  # ── Install & Cache ─────────────────────────────────────────────────────────
  install:
    name: Install Dependencies
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Cache node_modules
        uses: actions/cache/save@v4
        with:
          path: |
            node_modules
            packages/*/node_modules
            services/*/node_modules
            .pnpm-store
          key: pnpm-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

  # ── Typecheck ───────────────────────────────────────────────────────────────
  typecheck:
    name: Typecheck
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - name: Restore cache
        uses: actions/cache/restore@v4
        with:
          path: |
            node_modules
            packages/*/node_modules
            services/*/node_modules
          key: pnpm-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
      - run: pnpm typecheck

  # ── Build ────────────────────────────────────────────────────────────────────
  build:
    name: Build
    needs: typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - name: Restore cache
        uses: actions/cache/restore@v4
        with:
          path: |
            node_modules
            packages/*/node_modules
            services/*/node_modules
          key: pnpm-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
      - name: Build packages
        run: |
          pnpm --filter @rald-alia/shared build
          pnpm --filter @rald-alia/kafka build
          pnpm --filter @rald-alia/db build
      - name: Build services
        run: pnpm --filter './services/*' build
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: |
            services/*/dist/
            packages/*/dist/
          retention-days: 1

  # ── Test ─────────────────────────────────────────────────────────────────────
  test:
    name: Test
    needs: build
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: raldalia_test
          POSTGRES_PASSWORD: raldalia_test
          POSTGRES_DB: raldalia_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://raldalia_test:raldalia_test@localhost:5432/raldalia_test
      REDIS_URL: redis://localhost:6379
      NODE_ENV: test
      JWT_SECRET: test-jwt-secret-32-chars-minimum-len
      MACHINE_JWT_SECRET: test-machine-jwt-secret-32-chars-min
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - name: Restore cache
        uses: actions/cache/restore@v4
        with:
          path: |
            node_modules
            packages/*/node_modules
            services/*/node_modules
          key: pnpm-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
      - name: Run migrations
        run: |
          pnpm --filter @rald-alia/db db:migrate
      - name: Run tests
        run: pnpm test --reporter=verbose

  # ── Docker Build & Push (main branch only) ────────────────────────────────
  docker:
    name: Docker Build & Push
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    strategy:
      matrix:
        service:
          - identity-service
          - alias-service
          - directory-service
          - resolution-engine
          - routing-service
          - fraud-service
          - audit-service
          - notification-service
          - governance-service
          - consent-service
          - trust-service
          - merchant-service
          - verification-service
          - institution-service
          - registry-service
          - gateway
    steps:
      - uses: actions/checkout@v4
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
      - name: Build and push ${{ matrix.service }}
        env:
          IMAGE_TAG: ${{ github.sha }}
          SHORT_SHA: ${{ github.sha }}
        run: |
          docker build \
            -t $ECR_REGISTRY/$ECR_REPOSITORY_PREFIX/${{ matrix.service }}:$IMAGE_TAG \
            -t $ECR_REGISTRY/$ECR_REPOSITORY_PREFIX/${{ matrix.service }}:latest \
            -f services/${{ matrix.service }}/Dockerfile \
            .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY_PREFIX/${{ matrix.service }}:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY_PREFIX/${{ matrix.service }}:latest

  # ── Deploy to Dev (main branch) ──────────────────────────────────────────
  deploy-dev:
    name: Deploy → Dev
    needs: docker
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: development
    steps:
      - uses: actions/checkout@v4
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Update ECS services
        run: |
          SERVICES=(
            identity-service alias-service directory-service resolution-engine
            routing-service fraud-service audit-service notification-service
            governance-service consent-service trust-service merchant-service
            verification-service institution-service registry-service gateway
          )
          for svc in "${SERVICES[@]}"; do
            aws ecs update-service \
              --cluster alia-dev \
              --service alia-${svc}-dev \
              --force-new-deployment \
              --region ${{ env.AWS_REGION }} || true
            echo "Triggered deployment for $svc"
          done

  # ── Deploy to Staging (tag v*-rc*) ────────────────────────────────────────
  deploy-staging:
    name: Deploy → Staging
    needs: docker
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') && contains(github.ref, '-rc')
    environment: staging
    steps:
      - uses: actions/checkout@v4
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Update ECS services
        run: |
          SERVICES=(
            identity-service alias-service directory-service resolution-engine
            routing-service fraud-service audit-service notification-service
            governance-service consent-service trust-service merchant-service
            verification-service institution-service registry-service gateway
          )
          for svc in "${SERVICES[@]}"; do
            aws ecs update-service \
              --cluster alia-staging \
              --service alia-${svc}-staging \
              --force-new-deployment \
              --region ${{ env.AWS_REGION }} || true
          done

  # ── Deploy to Production (tag v*, no -rc) ────────────────────────────────
  deploy-production:
    name: Deploy → Production
    needs: [docker, deploy-staging]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') && !contains(github.ref, '-rc')
    environment: production
    steps:
      - uses: actions/checkout@v4
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Update ECS services (rolling deploy)
        run: |
          SERVICES=(
            identity-service alias-service directory-service resolution-engine
            routing-service fraud-service audit-service notification-service
            governance-service consent-service trust-service merchant-service
            verification-service institution-service registry-service gateway
          )
          for svc in "${SERVICES[@]}"; do
            aws ecs update-service \
              --cluster alia-production \
              --service alia-${svc}-production \
              --force-new-deployment \
              --region ${{ env.AWS_REGION }} || true
          done
