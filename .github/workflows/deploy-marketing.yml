name: Deploy — Cloudflare Pages (alia.rald.cloud)

on:
  push:
    branches: [main]
    paths:
      - 'frontend/apps/marketing-site/**'
      - '.github/workflows/deploy-marketing.yml'
  workflow_dispatch:

concurrency:
  group: deploy-marketing-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Build → Cloudflare Pages
    runs-on: ubuntu-latest
    timeout-minutes: 15

    permissions:
      contents: read
      deployments: write

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: '9'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Get pnpm store path
        id: pnpm-cache
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

      - name: Restore pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: pnpm-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: pnpm-${{ runner.os }}-
        continue-on-error: true

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build marketing site (static export)
        working-directory: frontend/apps/marketing-site
        env:
          NODE_ENV: production
          NEXT_PUBLIC_SITE_URL: https://alia.rald.cloud
          NEXT_PUBLIC_DEVELOPER_URL: https://developer.alia.rald.cloud
          NEXT_PUBLIC_DOCS_URL: https://docs.alia.rald.cloud
          NEXT_PUBLIC_API_URL: https://api.alia.rald.cloud
        run: pnpm build

      - name: Install Wrangler (global, avoids pnpm workspace conflict)
        run: npm install -g wrangler@3

      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          wrangler pages deploy frontend/apps/marketing-site/out \
            --project-name=alia-marketing \
            --branch=main

      - name: Health check
        run: |
          sleep 20
          STATUS=$(curl -sf -o /dev/null -w "%{http_code}" https://alia.rald.cloud || echo "000")
          echo "alia.rald.cloud → HTTP $STATUS"
          [ "$STATUS" = "200" ] && echo "✓ ALIA live" || echo "⚠ DNS may still be propagating"
        continue-on-error: true
