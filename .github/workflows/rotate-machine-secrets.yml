name: Rotate Machine Secrets

# Runs monthly on the 1st. Also triggerable manually for emergency rotation.
on:
  schedule:
    - cron: '0 6 1 * *'    # 06:00 UTC on the 1st of every month
  workflow_dispatch:
    inputs:
      service:
        description: 'Service to rotate (leave blank for ALL 19 services)'
        type: string
        required: false
        default: ''
      dry_run:
        description: 'Dry run — generate new secrets but do not commit them'
        type: boolean
        default: false

concurrency:
  group: rotate-machine-secrets
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write    # for OIDC AWS auth (if configured)

jobs:
  rotate:
    name: Rotate Machine Client Secrets
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: '9'
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ secrets.AWS_REGION || 'eu-west-1' }}

      - name: Rotate machine secrets
        env:
          DRY_RUN:      ${{ inputs.dry_run || 'false' }}
          TARGET_SVC:   ${{ inputs.service || '' }}
          AWS_REGION:   ${{ secrets.AWS_REGION || 'eu-west-1' }}
          ENVIRONMENT:  production
        run: |
          node << 'JSEOF'
          const { createHash, randomBytes } = require('crypto');
          const { execSync } = require('child_process');

          const DRY_RUN    = process.env.DRY_RUN === 'true';
          const TARGET_SVC = process.env.TARGET_SVC || '';
          const ENV        = process.env.ENVIRONMENT || 'production';
          const REGION     = process.env.AWS_REGION;
          const PREFIX     = `alia-${ENV}`;

          // All 19 ALIA services
          const ALL_SERVICES = [
            'identity-service', 'alias-service', 'directory-service',
            'resolution-engine', 'routing-service', 'fraud-service',
            'audit-service', 'notification-service', 'governance-service',
            'consent-service', 'trust-service', 'merchant-service',
            'verification-service', 'institution-service', 'registry-service',
            'developer-service', 'control-plane', 'loop-voice', 'gateway',
          ];

          const services = TARGET_SVC
            ? ALL_SERVICES.filter(s => s === TARGET_SVC)
            : ALL_SERVICES;

          if (services.length === 0) {
            console.error(`Service not found: ${TARGET_SVC}`);
            process.exit(1);
          }

          function newSecret() {
            return 'alia_ms_' + randomBytes(32).toString('hex');
          }

          function hashSecret(s) {
            return createHash('sha256').update(s).digest('hex');
          }

          function putSecret(name, value) {
            const cmd = `aws secretsmanager put-secret-value \
              --secret-id "${name}" \
              --secret-string "${value}" \
              --region "${REGION}" 2>&1 || \
              aws secretsmanager create-secret \
              --name "${name}" \
              --secret-string "${value}" \
              --region "${REGION}"`;
            execSync(cmd, { stdio: 'pipe' });
          }

          console.log(`\n${'='.repeat(60)}`);
          console.log(`RALD ALIA — Machine Secret Rotation`);
          console.log(`  Environment: ${ENV}`);
          console.log(`  Services:    ${services.length}`);
          console.log(`  Dry run:     ${DRY_RUN}`);
          console.log(`  Target:      ${TARGET_SVC || 'ALL'}`);
          console.log(`  Time:        ${new Date().toISOString()}`);
          console.log('='.repeat(60) + '\n');

          let ok = 0, fail = 0;
          const rotated = [];

          for (const svc of services) {
            const secretName = `${PREFIX}/${svc}/machine-client-secret`;
            const newVal     = newSecret();
            const hash       = hashSecret(newVal);

            console.log(`── ${svc}`);

            if (DRY_RUN) {
              console.log(`  [DRY RUN] would rotate — new hash prefix: ${hash.slice(0, 16)}...`);
              ok++;
              continue;
            }

            try {
              putSecret(secretName, newVal);
              rotated.push({ service: svc, hash: hash.slice(0, 16) });
              console.log(`  ✓ rotated — ${secretName}`);
              ok++;
            } catch (err) {
              console.error(`  ✗ FAILED: ${err.message}`);
              fail++;
            }
          }

          console.log(`\n${'='.repeat(60)}`);
          console.log(`RESULT: ${ok} rotated, ${fail} failed`);
          console.log(`Next rotation due: ${new Date(Date.now() + 30 * 86400000).toISOString().slice(0, 10)}`);
          console.log('='.repeat(60) + '\n');

          if (fail > 0) {
            console.error(`${fail} service(s) failed rotation. Check AWS Secrets Manager permissions.`);
            process.exit(1);
          }
          JSEOF

      - name: Trigger ECS redeployment (pick up new secrets)
        if: ${{ inputs.dry_run != 'true' }}
        env:
          AWS_REGION: ${{ secrets.AWS_REGION || 'eu-west-1' }}
          TARGET_SVC: ${{ inputs.service || '' }}
        run: |
          ALL_SERVICES=(
            identity-service alias-service directory-service resolution-engine
            routing-service fraud-service audit-service notification-service
            governance-service consent-service trust-service merchant-service
            verification-service institution-service registry-service
            developer-service control-plane loop-voice gateway
          )

          SERVICES=("${ALL_SERVICES[@]}")
          if [ -n "$TARGET_SVC" ]; then
            SERVICES=("$TARGET_SVC")
          fi

          echo "Forcing ECS redeployment to pick up rotated secrets..."
          for svc in "${SERVICES[@]}"; do
            aws ecs update-service \
              --cluster alia-production \
              --service "alia-${svc}-production" \
              --force-new-deployment \
              --region "$AWS_REGION" \
              --no-cli-pager 2>/dev/null \
            && echo "  ✓ ${svc}" \
            || echo "  ⚠ ${svc} (service may not exist yet)"
          done

      - name: Audit log
        if: always()
        run: |
          echo "AUDIT: job=rotate-machine-secrets target=${{ inputs.service || 'ALL' }} dry_run=${{ inputs.dry_run }} actor=${{ github.actor }} sha=${{ github.sha }} ts=$(date -u +%Y-%m-%dT%H:%M:%SZ) result=${{ job.status }}"
