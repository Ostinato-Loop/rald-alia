version: '3.9'

# RALD ALIA — Development override
# Usage: docker-compose -f docker-compose.yml -f docker-compose.dev.yml up
# Adds: Kafka UI, pgAdmin, hot-reload volumes, debug logging

services:

  # ── Dev tooling ─────────────────────────────────────────────────────────────

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    ports:
      - '8080:8080'
    environment:
      KAFKA_CLUSTERS_0_NAME: alia-local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    networks: [alia-network]
    depends_on:
      - kafka

  pgadmin:
    image: dpage/pgadmin4:latest
    ports:
      - '5050:80'
    environment:
      PGADMIN_DEFAULT_EMAIL: dev@rald.cloud
      PGADMIN_DEFAULT_PASSWORD: dev
    networks: [alia-network]
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      postgres:
        condition: service_healthy

  redis-insight:
    image: redislabs/redisinsight:latest
    ports:
      - '5540:5540'
    networks: [alia-network]

  # ── Override services with dev settings ─────────────────────────────────────

  identity-service:
    environment:
      NODE_ENV: development
      LOG_LEVEL: debug

  alias-service:
    environment:
      NODE_ENV: development
      LOG_LEVEL: debug

  directory-service:
    environment:
      NODE_ENV: development
      LOG_LEVEL: debug

  resolution-engine:
    environment:
      NODE_ENV: development
      LOG_LEVEL: debug

  routing-service:
    environment:
      NODE_ENV: development
      LOG_LEVEL: debug

  governance-service:
    environment:
      NODE_ENV: development
      LOG_LEVEL: debug

  consent-service:
    environment:
      NODE_ENV: development
      LOG_LEVEL: debug

  trust-service:
    environment:
      NODE_ENV: development
      LOG_LEVEL: debug

  gateway:
    environment:
      NODE_ENV: development
      LOG_LEVEL: debug

volumes:
  pgadmin_data:
