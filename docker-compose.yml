      REDIS_URL: redis://:${REDIS_PASSWORD:-raldalia_redis}@redis:6379
      KAFKA_BROKERS: kafka:9092
      JWT_SECRET: ${JWT_SECRET}
      MACHINE_JWT_SECRET: ${MACHINE_JWT_SECRET}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
