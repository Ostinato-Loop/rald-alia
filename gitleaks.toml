# gitleaks configuration
# https://github.com/gitleaks/gitleaks

title = "RALD ALIA — gitleaks config"

[allowlist]
description = "Global allowlist — .env.example files and placeholder values"
paths = [
  ".env.example",
  '''services/[^/]+/\.env\.example''',
  '''packages/[^/]+/\.env\.example''',
  '''lib/[^/]+/\.env\.example''',
]
regexes = [
  '''your[-_]?.*[-_]?here''',
  '''PLACEHOLDER''',
  '''example\.com''',
  '''localhost''',
  '''changeme''',
  '''CHANGE_ME''',
  '''test[-_]?secret''',
  '''test[-_]?jwt''',
]
