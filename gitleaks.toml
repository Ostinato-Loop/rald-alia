# gitleaks configuration
# https://github.com/zricethezav/gitleaks

title = "RALD ALIA — gitleaks config"

[allowlist]
description = "Allow .env.example files — these contain only placeholder values, no real secrets"
paths = [
  ".env.example",
  "services/.*/\\.env\\.example",
  "packages/.*/\\.env\\.example",
]

# Ignore fake/placeholder values in comments and docs
[[rules.allowlists]]
description = "Ignore placeholder patterns"
regexes = [
  "your[-_]?.*[-_]?here",
  "PLACEHOLDER",
  "example\\.com",
  "localhost",
  "changeme",
  "CHANGE_ME",
  "test[-_]?secret",
  "test[-_]?jwt",
]
