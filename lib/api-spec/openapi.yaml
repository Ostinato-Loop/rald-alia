openapi: 3.1.0
info:
  title: RALD ALIA API
  version: 1.0.0
  description: |
    RALD ALIA — Financial Identity & Trust Network for Africa.

    Contract-first unified API specification across all platform domains:
    Identity, Alias, Directory, Resolution, Routing, Consent, Fraud, Trust,
    Verification, Merchant, Governance, and Audit.

    All paths are prefixed with /v1. Authentication uses Bearer JWT tokens
    issued by the identity-service auth endpoints.

servers:
  - url: /v1
    description: ALIA API v1

security:
  - bearerAuth: []

tags:
  - name: health
    description: Platform health
  - name: auth
    description: Authentication and token management
  - name: users
    description: User identity management
  - name: organizations
    description: Organisation identity management
  - name: aliases
    description: Alias registry — email, phone, username, business handle
  - name: directory
    description: Public alias directory lookup (cached, read-optimised)
  - name: resolution
    description: Real-time alias resolution to bank routing tokens
  - name: routing
    description: Payment routing profile management
  - name: consent
    description: Consent grants between subjects and grantees
  - name: mandates
    description: Recurring payment mandates
  - name: permissions
    description: Permission scope registry and verification
  - name: fraud
    description: Real-time fraud scoring and event management
  - name: trust
    description: Trust scores, signals, reputation, and history
  - name: verification
    description: KYC, document verification, and verifiable credentials
  - name: merchants
    description: Merchant registration, verification, and management
  - name: governance
    description: Policies, country rules, and compliance checks
  - name: audit
    description: Immutable audit log queries

paths:

  # ── Health ─────────────────────────────────────────────────────────────────
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Platform health check
      security: []
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ── Auth ───────────────────────────────────────────────────────────────────
  /auth/register:
    post:
      operationId: register
      tags: [auth]
      summary: Register a new identity
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: Registration initiated — OTP sent to email
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RegisterResponse"
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          $ref: "#/components/responses/ValidationError"

  /auth/verify-email:
    post:
      operationId: verifyEmail
      tags: [auth]
      summary: Verify email address with OTP and receive tokens
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VerifyEmailRequest"
      responses:
        "200":
          description: Email verified — tokens issued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenPair"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"

  /auth/resend-otp:
    post:
      operationId: resendOtp
      tags: [auth]
      summary: Resend email verification OTP
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResendOtpRequest"
      responses:
        "200":
          description: OTP resent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Authenticate and receive JWT tokens
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Authenticated — tokens issued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenPair"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /auth/refresh:
    post:
      operationId: refreshToken
      tags: [auth]
      summary: Rotate refresh token and receive new access token
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshRequest"
      responses:
        "200":
          description: Tokens rotated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenPair"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /auth/forgot-password:
    post:
      operationId: forgotPassword
      tags: [auth]
      summary: Initiate password reset (always returns 200 to prevent enumeration)
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ForgotPasswordRequest"
      responses:
        "200":
          description: Reset OTP sent if email exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /auth/reset-password:
    post:
      operationId: resetPassword
      tags: [auth]
      summary: Apply new password using OTP
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResetPasswordRequest"
      responses:
        "200":
          description: Password updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "400":
          $ref: "#/components/responses/BadRequest"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Fetch authenticated identity profile
      responses:
        "200":
          description: Authenticated identity
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IdentityProfile"
        "401":
          $ref: "#/components/responses/Unauthorized"

  # ── Users ──────────────────────────────────────────────────────────────────
  /users:
    post:
      operationId: createUser
      tags: [users]
      summary: Create a new user identity
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateUserRequest"
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "409":
          $ref: "#/components/responses/Conflict"

  /users/{userId}:
    get:
      operationId: getUserById
      tags: [users]
      summary: Fetch user by ID
      parameters:
        - $ref: "#/components/parameters/UserId"
      responses:
        "200":
          description: User
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      operationId: updateUser
      tags: [users]
      summary: Update user fields
      parameters:
        - $ref: "#/components/parameters/UserId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUserRequest"
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /users/{userId}/verify:
    post:
      operationId: verifyUser
      tags: [users]
      summary: Trigger identity verification (BVN, NIN, email, phone)
      parameters:
        - $ref: "#/components/parameters/UserId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VerifyUserRequest"
      responses:
        "200":
          description: Verification result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VerificationResult"

  # ── Organizations ─────────────────────────────────────────────────────────
  /organizations:
    post:
      operationId: createOrganization
      tags: [organizations]
      summary: Register a new organisation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateOrganizationRequest"
      responses:
        "201":
          description: Organisation created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Organization"
        "409":
          $ref: "#/components/responses/Conflict"

  /organizations/{orgId}:
    get:
      operationId: getOrganizationById
      tags: [organizations]
      summary: Fetch organisation by ID
      parameters:
        - $ref: "#/components/parameters/OrgId"
      responses:
        "200":
          description: Organisation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Organization"
        "404":
          $ref: "#/components/responses/NotFound"

  # ── Aliases ────────────────────────────────────────────────────────────────
  /aliases:
    get:
      operationId: listAliases
      tags: [aliases]
      summary: List aliases with optional filters
      parameters:
        - name: userId
          in: query
          schema:
            type: string
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: Paginated alias list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedAliases"
    post:
      operationId: createAlias
      tags: [aliases]
      summary: Register a new alias
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAliasRequest"
      responses:
        "201":
          description: Alias created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Alias"
        "409":
          $ref: "#/components/responses/Conflict"

  /aliases/{aliasId}:
    get:
      operationId: getAliasById
      tags: [aliases]
      summary: Fetch alias by ID
      parameters:
        - $ref: "#/components/parameters/AliasId"
      responses:
        "200":
          description: Alias
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Alias"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      operationId: updateAlias
      tags: [aliases]
      summary: Update alias bank routing details
      parameters:
        - $ref: "#/components/parameters/AliasId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateAliasRequest"
      responses:
        "200":
          description: Updated alias
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Alias"
    delete:
      operationId: deleteAlias
      tags: [aliases]
      summary: Soft-delete an alias
      parameters:
        - $ref: "#/components/parameters/AliasId"
      responses:
        "204":
          description: Deleted

  # ── Directory ─────────────────────────────────────────────────────────────
  /directory/lookup:
    get:
      operationId: directoryLookup
      tags: [directory]
      summary: Lookup alias in the public directory (cached)
      parameters:
        - name: alias
          in: query
          required: true
          description: Email, phone number, username, or business handle
          schema:
            type: string
      responses:
        "200":
          description: Directory entry
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DirectoryEntry"
        "404":
          $ref: "#/components/responses/NotFound"

  /directory/stats:
    get:
      operationId: directoryStats
      tags: [directory]
      summary: Network directory statistics
      responses:
        "200":
          description: Directory stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DirectoryStats"

  /directory/{token}:
    get:
      operationId: directoryLookupByToken
      tags: [directory]
      summary: Lookup alias by account token
      parameters:
        - name: token
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Directory entry
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DirectoryEntry"
        "404":
          $ref: "#/components/responses/NotFound"

  # ── Resolution ─────────────────────────────────────────────────────────────
  /resolve:
    post:
      operationId: resolveAlias
      tags: [resolution]
      summary: Resolve an alias to a bank routing token in real time
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResolveRequest"
      responses:
        "200":
          description: Resolution result with routing token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResolutionResult"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/ValidationError"

  # ── Routing ────────────────────────────────────────────────────────────────
  /routing/profile/{userId}:
    get:
      operationId: getRoutingProfile
      tags: [routing]
      summary: Get routing profile for a user
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Routing profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RoutingProfile"
        "404":
          $ref: "#/components/responses/NotFound"

  /routing/profile:
    post:
      operationId: upsertRoutingProfile
      tags: [routing]
      summary: Create or update a routing profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpsertRoutingProfileRequest"
      responses:
        "200":
          description: Routing profile upserted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RoutingProfile"

  /routing/determine:
    post:
      operationId: determineRoute
      tags: [routing]
      summary: Determine optimal routing for a transaction
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DetermineRouteRequest"
      responses:
        "200":
          description: Routing decision
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RouteDecision"

  # ── Consent ────────────────────────────────────────────────────────────────
  /consents/grant:
    post:
      operationId: grantConsent
      tags: [consent]
      summary: Grant consent from subject to grantee
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GrantConsentRequest"
      responses:
        "201":
          description: Consent granted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConsentResponse"

  /consents:
    get:
      operationId: listConsents
      tags: [consent]
      summary: List consents with optional filters
      parameters:
        - name: subject_id
          in: query
          schema:
            type: string
        - name: grantee_id
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
            enum: [active, revoked, expired]
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: Consent list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedConsents"

  /consents/verify:
    post:
      operationId: verifyConsent
      tags: [consent]
      summary: Verify active consent for a scope set
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VerifyConsentRequest"
      responses:
        "200":
          description: Consent verification result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConsentVerificationResult"

  /consents/{consentId}:
    get:
      operationId: getConsentById
      tags: [consent]
      summary: Fetch a specific consent record
      parameters:
        - $ref: "#/components/parameters/ConsentId"
      responses:
        "200":
          description: Consent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConsentResponse"
        "404":
          $ref: "#/components/responses/NotFound"

  /consents/{consentId}/revoke:
    post:
      operationId: revokeConsent
      tags: [consent]
      summary: Revoke a consent grant
      parameters:
        - $ref: "#/components/parameters/ConsentId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RevokeConsentRequest"
      responses:
        "200":
          description: Consent revoked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConsentResponse"

  /consents/{consentId}/audit:
    get:
      operationId: getConsentAuditTrail
      tags: [consent]
      summary: Fetch audit trail for a consent
      parameters:
        - $ref: "#/components/parameters/ConsentId"
      responses:
        "200":
          description: Consent audit trail
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ConsentAuditEvent"

  # ── Mandates ───────────────────────────────────────────────────────────────
  /mandates:
    get:
      operationId: listMandates
      tags: [mandates]
      summary: List payment mandates
      parameters:
        - name: subject_id
          in: query
          schema:
            type: string
        - name: merchant_id
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: Mandate list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedMandates"
    post:
      operationId: createMandate
      tags: [mandates]
      summary: Create a recurring payment mandate
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateMandateRequest"
      responses:
        "201":
          description: Mandate created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MandateResponse"

  /mandates/{mandateId}:
    get:
      operationId: getMandateById
      tags: [mandates]
      summary: Fetch mandate by ID
      parameters:
        - $ref: "#/components/parameters/MandateId"
      responses:
        "200":
          description: Mandate
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MandateResponse"
        "404":
          $ref: "#/components/responses/NotFound"

  /mandates/{mandateId}/cancel:
    post:
      operationId: cancelMandate
      tags: [mandates]
      summary: Cancel a payment mandate
      parameters:
        - $ref: "#/components/parameters/MandateId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CancelMandateRequest"
      responses:
        "200":
          description: Mandate cancelled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MandateResponse"

  /mandates/{mandateId}/verify:
    post:
      operationId: verifyMandate
      tags: [mandates]
      summary: Verify a mandate covers a specific amount
      parameters:
        - $ref: "#/components/parameters/MandateId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VerifyMandateRequest"
      responses:
        "200":
          description: Mandate verification result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MandateVerificationResult"

  # ── Permissions ────────────────────────────────────────────────────────────
  /permissions/scopes:
    get:
      operationId: listPermissionScopes
      tags: [permissions]
      summary: List all available permission scopes
      responses:
        "200":
          description: Permission scopes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PermissionScope"

  /permissions/check:
    post:
      operationId: checkPermissions
      tags: [permissions]
      summary: Check whether a grantee has specific scopes for a subject
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CheckPermissionsRequest"
      responses:
        "200":
          description: Permission check results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CheckPermissionsResult"

  # ── Fraud ──────────────────────────────────────────────────────────────────
  /fraud/score:
    post:
      operationId: scoreFraud
      tags: [fraud]
      summary: Score an entity for fraud risk in real time
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FraudScoreRequest"
      responses:
        "200":
          description: Fraud score result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FraudScoreResult"

  /fraud/events:
    get:
      operationId: listFraudEvents
      tags: [fraud]
      summary: List fraud events
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: Fraud events
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedFraudEvents"

  /fraud/events/{eventId}/resolve:
    post:
      operationId: resolveFraudEvent
      tags: [fraud]
      summary: Mark a fraud event as resolved
      parameters:
        - name: eventId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                resolvedBy:
                  type: string
              required: [resolvedBy]
      responses:
        "200":
          description: Event resolved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  # ── Trust ──────────────────────────────────────────────────────────────────
  /trust/scores/{entityId}:
    get:
      operationId: getTrustScore
      tags: [trust]
      summary: Get trust score for an entity
      parameters:
        - name: entityId
          in: path
          required: true
          schema:
            type: string
        - name: entity_type
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/EntityType"
      responses:
        "200":
          description: Trust score
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TrustScore"
        "404":
          $ref: "#/components/responses/NotFound"

  /trust/scores/calculate:
    post:
      operationId: calculateTrustScore
      tags: [trust]
      summary: Calculate trust score from signals
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CalculateTrustScoreRequest"
      responses:
        "200":
          description: Calculated trust score
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TrustScore"

  /trust/scores/signal:
    post:
      operationId: ingestTrustSignal
      tags: [trust]
      summary: Ingest a trust signal for an entity
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TrustSignalRequest"
      responses:
        "200":
          description: Signal ingested
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /trust/history/{entityId}:
    get:
      operationId: getTrustHistory
      tags: [trust]
      summary: Get trust score history for an entity
      parameters:
        - name: entityId
          in: path
          required: true
          schema:
            type: string
        - name: entity_type
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/EntityType"
        - name: from
          in: query
          schema:
            type: string
            format: date-time
        - name: to
          in: query
          schema:
            type: string
            format: date-time
        - name: limit
          in: query
          schema:
            type: integer
            default: 100
      responses:
        "200":
          description: Trust history
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TrustHistory"

  /trust/reputation/{entityId}:
    get:
      operationId: getReputationProfile
      tags: [trust]
      summary: Get reputation profile for an entity
      parameters:
        - name: entityId
          in: path
          required: true
          schema:
            type: string
        - name: entity_type
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/EntityType"
      responses:
        "200":
          description: Reputation profile
          content:
            application/json:
              schema:
