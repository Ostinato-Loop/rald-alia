# ────────────────────────────────────────────────────────────────────────────
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    UserId:
      name: userId
      in: path
      required: true
      schema:
        type: string
    OrgId:
      name: orgId
      in: path
      required: true
      schema:
        type: string
    AliasId:
      name: aliasId
      in: path
      required: true
      schema:
        type: string
    ConsentId:
      name: consentId
      in: path
      required: true
      schema:
        type: string
    MandateId:
      name: mandateId
      in: path
      required: true
      schema:
        type: string
    MerchantId:
      name: merchantId
      in: path
      required: true
      schema:
        type: string
    PolicyId:
      name: policyId
      in: path
      required: true
      schema:
        type: string
    Page:
      name: page
      in: query
      schema:
        type: integer
        minimum: 1
        default: 1
    Limit:
      name: limit
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 200
        default: 50

  schemas:
    # ── Shared ──────────────────────────────────────────────────────────────
    HealthStatus:
      type: object
      properties:
        status:
          type: string
          enum: [ok]
      required: [status]

    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
      required: [success]

    MessageResponse:
      type: object
      properties:
        message:
          type: string
      required: [message]

    ErrorResponse:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: object
          additionalProperties: true
      required: [code, message]

    Pagination:
      type: object
      properties:
        page:
          type: integer
        limit:
          type: integer
        total:
          type: integer
        totalPages:
          type: integer
      required: [page, limit, total, totalPages]

    EntityType:
      type: string
      enum: [user, business, merchant, developer, bank, institution]

    RiskLevel:
      type: string
      enum: [low, medium, high, critical]

    # ── Auth ────────────────────────────────────────────────────────────────
    RegisterRequest:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
        firstName:
          type: string
        lastName:
          type: string
      required: [email, password, firstName, lastName]

    RegisterResponse:
      type: object
      properties:
        message:
          type: string
        userId:
          type: string
      required: [message, userId]

    VerifyEmailRequest:
      type: object
      properties:
        email:
          type: string
          format: email
        otp:
          type: string
          minLength: 6
          maxLength: 6
      required: [email, otp]

    ResendOtpRequest:
      type: object
      properties:
        email:
          type: string
          format: email
      required: [email]

    LoginRequest:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
      required: [email, password]

    RefreshRequest:
      type: object
      properties:
        refreshToken:
          type: string
      required: [refreshToken]

    ForgotPasswordRequest:
      type: object
      properties:
        email:
          type: string
          format: email
      required: [email]

    ResetPasswordRequest:
      type: object
      properties:
        email:
          type: string
          format: email
        otp:
          type: string
          minLength: 6
          maxLength: 6
        newPassword:
          type: string
          minLength: 8
      required: [email, otp, newPassword]

    TokenPair:
      type: object
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string
        expiresIn:
          type: integer
          description: Access token TTL in seconds
      required: [accessToken, refreshToken, expiresIn]

    IdentityProfile:
      type: object
      properties:
        id:
          type: string
        email:
          type: string
          format: email
        firstName:
          type: string
        lastName:
          type: string
        isVerified:
          type: boolean
        isActive:
          type: boolean
        createdAt:
          type: string
          format: date-time
      required: [id, email, firstName, lastName, isVerified, isActive, createdAt]

    # ── Users ────────────────────────────────────────────────────────────────
    CreateUserRequest:
      type: object
      properties:
        email:
          type: string
          format: email
        phone:
          type: string
        firstName:
          type: string
        lastName:
          type: string
        bvn:
          type: string
          minLength: 11
          maxLength: 11
      required: [email, firstName, lastName]

    UpdateUserRequest:
      type: object
      properties:
        phone:
          type: string
        firstName:
          type: string
        lastName:
          type: string

    VerifyUserRequest:
      type: object
      properties:
        verificationType:
          type: string
          enum: [bvn, nin, email, phone]
        value:
          type: string
      required: [verificationType, value]

    VerificationResult:
      type: object
      properties:
        verified:
          type: boolean
        verificationType:
          type: string
        verifiedAt:
          type: string
          format: date-time
      required: [verified, verificationType]

    User:
      type: object
      properties:
        id:
          type: string
        email:
          type: string
          format: email
        phone:
          type: string
        firstName:
          type: string
        lastName:
          type: string
        isVerified:
          type: boolean
        isActive:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required: [id, email, firstName, lastName, isVerified, isActive, createdAt, updatedAt]

    # ── Organizations ────────────────────────────────────────────────────────
    CreateOrganizationRequest:
      type: object
      properties:
        name:
          type: string
        handle:
          type: string
          pattern: "^[a-zA-Z0-9_-]+$"
          minLength: 2
          maxLength: 30
        email:
          type: string
          format: email
        rcNumber:
          type: string
        ownerId:
          type: string
      required: [name, handle, email, ownerId]

    Organization:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        handle:
          type: string
        email:
          type: string
          format: email
        rcNumber:
          type: string
        ownerId:
          type: string
        isVerified:
          type: boolean
        isActive:
          type: boolean
        createdAt:
          type: string
          format: date-time
      required: [id, name, handle, email, ownerId, isVerified, isActive, createdAt]

    # ── Aliases ──────────────────────────────────────────────────────────────
    AliasType:
      type: string
      enum: [email, phone, username, business_handle]

    AliasStatus:
      type: string
      enum: [active, suspended, pending, deleted]

    CreateAliasRequest:
      type: object
      properties:
        userId:
          type: string
        organizationId:
          type: string
        type:
          $ref: "#/components/schemas/AliasType"
        value:
          type: string
        bankCode:
          type: string
        accountToken:
          type: string
        accountName:
          type: string
        isPrimary:
          type: boolean
          default: false
      required: [type, value, bankCode, accountToken, accountName]

    UpdateAliasRequest:
      type: object
      properties:
        bankCode:
          type: string
        accountToken:
          type: string
        accountName:
          type: string
        isPrimary:
          type: boolean

    Alias:
      type: object
      properties:
        id:
          type: string
        userId:
          type: string
        organizationId:
          type: string
        type:
          $ref: "#/components/schemas/AliasType"
        value:
          type: string
        normalizedValue:
          type: string
        status:
          $ref: "#/components/schemas/AliasStatus"
        bankCode:
          type: string
        accountToken:
          type: string
        accountName:
          type: string
        isPrimary:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required: [id, type, value, normalizedValue, status, bankCode, accountToken, accountName, isPrimary, createdAt, updatedAt]

    PaginatedAliases:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Alias"
        pagination:
          $ref: "#/components/schemas/Pagination"
      required: [data, pagination]

    # ── Directory ────────────────────────────────────────────────────────────
    DirectoryEntry:
      type: object
      properties:
        aliasId:
          type: string
        type:
          $ref: "#/components/schemas/AliasType"
        value:
          type: string
        status:
          $ref: "#/components/schemas/AliasStatus"
        bankCode:
          type: string
        accountToken:
          type: string
        accountName:
          type: string
      required: [aliasId, type, value, status, bankCode, accountToken, accountName]

    DirectoryStats:
      type: object
      properties:
        total:
          type: integer
        active:
          type: integer
      required: [total, active]

    # ── Resolution ───────────────────────────────────────────────────────────
    ResolveRequest:
      type: object
      properties:
        alias:
          type: string
          description: Email, phone, username, or business handle
        amount:
          type: number
          description: Transaction amount (used for routing optimisation)
        currency:
          type: string
          minLength: 3
          maxLength: 3
      required: [alias]

    ResolutionResult:
      type: object
      properties:
        token:
          type: string
        routing:
          type: object
          properties:
            destinationBankCode:
              type: string
            destinationBankName:
              type: string
            accountName:
              type: string
          required: [destinationBankCode, destinationBankName, accountName]
        resolvedAt:
          type: string
          format: date-time
        latencyMs:
          type: integer
      required: [token, routing, resolvedAt, latencyMs]

    # ── Routing ──────────────────────────────────────────────────────────────
    UpsertRoutingProfileRequest:
      type: object
      properties:
        userId:
          type: string
        primaryBankCode:
          type: string
        fallbackBankCode:
          type: string
        routingRules:
          type: object
          additionalProperties: true
      required: [userId, primaryBankCode]

    RoutingProfile:
      type: object
      properties:
        id:
          type: string
        userId:
          type: string
        primaryBankCode:
          type: string
        fallbackBankCode:
          type: string
        routingRules:
          type: object
          additionalProperties: true
        isActive:
          type: boolean
        createdAt:
          type: string
          format: date-time
      required: [id, userId, primaryBankCode, isActive, createdAt]

    DetermineRouteRequest:
      type: object
      properties:
        userId:
          type: string
        amount:
          type: number
        currency:
          type: string
      required: [userId, amount]

    RouteDecision:
      type: object
      properties:
        destinationBankCode:
          type: string
        fallbackBankCode:
          type: string
        routingStrategy:
          type: string
          enum: [profile, bank_link, default]
      required: [destinationBankCode, routingStrategy]

    # ── Consent ──────────────────────────────────────────────────────────────
    GrantConsentRequest:
      type: object
      properties:
        subject_id:
          type: string
          format: uuid
        subject_type:
          type: string
          enum: [user, business, merchant]
        grantee_id:
          type: string
          format: uuid
        grantee_type:
          type: string
          enum: [merchant, developer, bank, institution, service]
        scope:
          type: array
          items:
            type: string
          minItems: 1
        purpose:
          type: string
        data_classes:
          type: array
          items:
            type: string
        duration_days:
          type: integer
          minimum: 1
          maximum: 3650
        conditions:
          type: object
          additionalProperties: true
      required: [subject_id, subject_type, grantee_id, grantee_type, scope, purpose, data_classes]

    ConsentResponse:
      type: object
      properties:
        id:
          type: string
        subject_id:
          type: string
        grantee_id:
          type: string
        scope:
          type: array
          items:
            type: string
        purpose:
          type: string
        status:
          type: string
          enum: [active, revoked, expired]
        granted_at:
          type: string
          format: date-time
        expires_at:
          type: string
          format: date-time
      required: [id, subject_id, grantee_id, scope, purpose, status, granted_at]

    VerifyConsentRequest:
      type: object
      properties:
        subject_id:
          type: string
          format: uuid
        grantee_id:
          type: string
          format: uuid
        required_scope:
          type: array
          items:
            type: string
          minItems: 1
      required: [subject_id, grantee_id, required_scope]

    ConsentVerificationResult:
      type: object
      properties:
        granted:
          type: boolean
        missing_scopes:
          type: array
          items:
            type: string
        consent_id:
          type: string
      required: [granted]

    RevokeConsentRequest:
      type: object
      properties:
        reason:
          type: string
        revoked_by:
          type: string
          format: uuid
      required: [reason, revoked_by]

    ConsentAuditEvent:
      type: object
      properties:
        event_type:
          type: string
        actor_id:
          type: string
        timestamp:
          type: string
          format: date-time
        metadata:
          type: object
          additionalProperties: true
      required: [event_type, timestamp]

    PaginatedConsents:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/ConsentResponse"
        pagination:
          $ref: "#/components/schemas/Pagination"
      required: [data, pagination]

    # ── Mandates ─────────────────────────────────────────────────────────────
    CreateMandateRequest:
      type: object
      properties:
        subject_id:
          type: string
          format: uuid
        merchant_id:
          type: string
          format: uuid
        purpose:
          type: string
        amount:
          type: number
        max_amount:
          type: number
        currency:
          type: string
          minLength: 3
          maxLength: 3
        frequency:
          type: string
          enum: [once, daily, weekly, monthly, quarterly, annual, custom]
        start_date:
          type: string
          format: date-time
        end_date:
          type: string
          format: date-time
      required: [subject_id, merchant_id, purpose, currency, frequency, start_date]

    MandateResponse:
      type: object
      properties:
        id:
          type: string
        subject_id:
          type: string
        merchant_id:
          type: string
        purpose:
          type: string
        currency:
          type: string
        frequency:
          type: string
        status:
          type: string
        start_date:
          type: string
          format: date-time
        created_at:
          type: string
          format: date-time
      required: [id, subject_id, merchant_id, purpose, currency, frequency, status, start_date, created_at]

    CancelMandateRequest:
      type: object
      properties:
        reason:
          type: string
        cancelled_by:
          type: string
          format: uuid
      required: [reason, cancelled_by]

    VerifyMandateRequest:
      type: object
      properties:
        amount:
          type: number
        currency:
          type: string
          minLength: 3
          maxLength: 3
      required: [amount, currency]

    MandateVerificationResult:
      type: object
      properties:
        valid:
          type: boolean
        reason:
          type: string
      required: [valid]

    PaginatedMandates:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/MandateResponse"
        pagination:
          $ref: "#/components/schemas/Pagination"
      required: [data, pagination]

    # ── Permissions ──────────────────────────────────────────────────────────
    PermissionScope:
      type: object
      properties:
        scope:
          type: string
        description:
          type: string
        risk:
          type: string
          enum: [low, medium, high]
      required: [scope, description, risk]

    CheckPermissionsRequest:
      type: object
      properties:
        subject_id:
          type: string
          format: uuid
        grantee_id:
          type: string
          format: uuid
        scopes:
          type: array
          items:
            type: string
          minItems: 1
      required: [subject_id, grantee_id, scopes]

    CheckPermissionsResult:
      type: object
      properties:
        subject_id:
          type: string
        grantee_id:
          type: string
        results:
          type: array
          items:
            type: object
            properties:
              scope:
                type: string
              granted:
                type: boolean
              reason:
                type: string
            required: [scope, granted]
      required: [subject_id, grantee_id, results]

    # ── Fraud ────────────────────────────────────────────────────────────────
    FraudScoreRequest:
      type: object
      properties:
        entityId:
          type: string
        entityType:
          type: string
          enum: [alias, user, organization]
        context:
          type: object
          properties:
            newDevice:
              type: boolean
            unusualHour:
              type: boolean
            foreignIp:
              type: boolean
          additionalProperties: true
      required: [entityId, entityType]

    FraudScoreResult:
      type: object
      properties:
        score:
          type: integer
          minimum: 0
          maximum: 100
        riskLevel:
          $ref: "#/components/schemas/RiskLevel"
        flags:
          type: array
          items:
            type: string
        recommendation:
          type: string
          enum: [allow, review, block]
      required: [score, riskLevel, flags, recommendation]

    FraudEvent:
      type: object
      properties:
        id:
          type: string
        entityId:
          type: string
        entityType:
          type: string
        riskScore:
          type: integer
        riskLevel:
          $ref: "#/components/schemas/RiskLevel"
        flags:
          type: array
          items:
            type: string
        action:
          type: string
        resolvedAt:
          type: string
          format: date-time
        resolvedBy:
          type: string
        createdAt:
          type: string
          format: date-time
      required: [id, entityId, entityType, riskScore, riskLevel, flags, action, createdAt]

    PaginatedFraudEvents:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/FraudEvent"
        pagination:
          $ref: "#/components/schemas/Pagination"
      required: [data, pagination]

    # ── Trust ────────────────────────────────────────────────────────────────
    TrustScore:
      type: object
      properties:
        entity_id:
          type: string
        entity_type:
          $ref: "#/components/schemas/EntityType"
        score:
          type: number
          minimum: 0
          maximum: 100
        level:
          $ref: "#/components/schemas/RiskLevel"
        calculated_at:
          type: string
          format: date-time
      required: [entity_id, entity_type, score, level, calculated_at]

    CalculateTrustScoreRequest:
      type: object
      properties:
        entity_id:
          type: string
          format: uuid
        entity_type:
          $ref: "#/components/schemas/EntityType"
        signals:
          type: array
          items:
            type: object
            properties:
              signal_type:
                type: string
              value:
                type: number
              weight:
                type: number
              source:
                type: string
            required: [signal_type, value, source]
      required: [entity_id, entity_type]

    TrustSignalRequest:
      type: object
      properties:
        entity_id:
          type: string
          format: uuid
        entity_type:
          $ref: "#/components/schemas/EntityType"
        signal_type:
          type: string
          enum:
            - verification_completed
            - verification_failed
            - transaction_success
            - transaction_failed
            - fraud_flagged
            - dispute_raised
            - dispute_resolved
            - account_age
            - kyc_upgrade
            - merchant_verified
            - document_verified
            - behaviour_anomaly
            - consent_granted
            - login_success
            - login_failed
        value:
          type: number
          minimum: -100
          maximum: 100
        source:
          type: string
        metadata:
          type: object
          additionalProperties: true
      required: [entity_id, entity_type, signal_type, value, source]

    TrustHistory:
      type: object
      properties:
        entity_id:
          type: string
        entity_type:
          type: string
        events:
          type: array
          items:
            type: object
            properties:
              score:
                type: number
              signal_type:
                type: string
              timestamp:
                type: string
                format: date-time
      required: [entity_id, entity_type, events]

    ReputationProfile:
      type: object
      properties:
        entity_id:
          type: string
        entity_type:
          type: string
        reputation_score:
          type: number
        flags:
          type: array
          items:
            type: object
            properties:
              reason:
                type: string
              severity:
                $ref: "#/components/schemas/RiskLevel"
              flagged_at:
                type: string
                format: date-time
        is_flagged:
          type: boolean
      required: [entity_id, entity_type, reputation_score, flags, is_flagged]

    FlagEntityRequest:
      type: object
      properties:
        entity_id:
          type: string
          format: uuid
        entity_type:
          type: string
        reason:
          type: string
          enum: [fraud_suspected, policy_violation, aml_flag, dispute_abuse, identity_mismatch, sanctions_match]
        severity:
          $ref: "#/components/schemas/RiskLevel"
        flagged_by:
          type: string
        evidence:
          type: string
      required: [entity_id, entity_type, reason, severity, flagged_by]

    # ── Verification ─────────────────────────────────────────────────────────
    KycDocumentType:
      type: string
      enum: [bvn, nin, passport, national_id, ghana_card, driving_license, voters_card, utility_bill, bank_statement, cac_certificate, tax_certificate]

    KycProvider:
      type: string
      enum: [internal, youverify, smile_id, dojah, prembly]

    InitiateKycRequest:
      type: object
      properties:
        entity_id:
          type: string
          format: uuid
        entity_type:
          type: string
          enum: [user, business, merchant]
        country:
          type: string
          minLength: 2
          maxLength: 2
        tier:
          type: string
          enum: ["1", "2", "3"]
        documents:
          type: array
          items:
            type: object
            properties:
              type:
                $ref: "#/components/schemas/KycDocumentType"
              value:
                type: string
              issuing_country:
                type: string
            required: [type, value]
          minItems: 1
        provider:
          $ref: "#/components/schemas/KycProvider"
        callback_url:
          type: string
          format: uri
      required: [entity_id, entity_type, country, tier, documents]

    KycSession:
      type: object
      properties:
        id:
          type: string
        entity_id:
          type: string
        entity_type:
          type: string
        status:
          type: string
          enum: [pending, in_progress, approved, rejected, expired]
        tier:
          type: string
        country:
          type: string
        provider:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
      required: [id, entity_id, entity_type, status, tier, country, created_at, updated_at]

    KycStatus:
      type: object
      properties:
        entity_id:
          type: string
        entity_type:
          type: string
        current_tier:
          type: string
        is_verified:
          type: boolean
        sessions:
          type: array
          items:
            $ref: "#/components/schemas/KycSession"
      required: [entity_id, entity_type, is_verified]

    VerifyBvnRequest:
      type: object
      properties:
        entity_id:
          type: string
          format: uuid
        bvn:
          type: string
          minLength: 11
          maxLength: 11
        first_name:
          type: string
        last_name:
          type: string
        date_of_birth:
          type: string
          format: date
      required: [entity_id, bvn]

    VerifyNinRequest:
      type: object
      properties:
        entity_id:
          type: string
          format: uuid
        nin:
          type: string
          minLength: 11
          maxLength: 11
        first_name:
          type: string
        last_name:
          type: string
      required: [entity_id, nin]

    IdentityVerificationResult:
      type: object
      properties:
        verified:
          type: boolean
        match_score:
          type: number
        provider:
          type: string
        verified_at:
          type: string
          format: date-time
      required: [verified]

    ReviewKycRequest:
      type: object
      properties:
        reviewed_by:
          type: string
        notes:
          type: string
      required: [reviewed_by]

    RejectKycRequest:
      type: object
      properties:
        reason:
          type: string
        reviewed_by:
          type: string
      required: [reason, reviewed_by]

    VerifyDocumentRequest:
      type: object
      properties:
        entity_id:
          type: string
          format: uuid
        document_type:
          type: string
          enum: [passport, national_id, driving_license, voters_card, ghana_card, utility_bill, bank_statement, cac_certificate]
        document_number:
          type: string
        issuing_country:
          type: string
          minLength: 2
          maxLength: 2
        first_name:
          type: string
        last_name:
          type: string
        date_of_birth:
          type: string
          format: date
        expiry_date:
          type: string
          format: date
        provider:
          $ref: "#/components/schemas/KycProvider"
      required: [entity_id, document_type, document_number, issuing_country]

    DocumentVerificationResult:
      type: object
      properties:
        verified:
          type: boolean
        document_type:
          type: string
        issuing_country:
          type: string
        match_score:
          type: number
        provider:
          type: string
        verified_at:
          type: string
          format: date-time
      required: [verified, document_type, issuing_country]

    DocumentRecord:
      type: object
      properties:
        id:
          type: string
        entity_id:
          type: string
        document_type:
          type: string
        issuing_country:
          type: string
        verified:
          type: boolean
        verified_at:
          type: string
          format: date-time
        created_at:
          type: string
          format: date-time
      required: [id, entity_id, document_type, issuing_country, verified, created_at]

    CredentialType:
      type: string
      enum:
        - identity_verified
        - bvn_verified
        - nin_verified
        - business_registered
        - merchant_certified
        - developer_certified
        - kyc_tier_1
        - kyc_tier_2
        - kyc_tier_3
        - alia_certified_developer
        - alia_certified_merchant
        - alia_certified_institution
        - sanctions_clear
        - pep_clear
        - tax_compliant

    IssueCredentialRequest:
      type: object
      properties:
        subject_id:
          type: string
          format: uuid
        subject_type:
          $ref: "#/components/schemas/EntityType"
        credential_type:
          $ref: "#/components/schemas/CredentialType"
        issuer_id:
          type: string
        evidence:
          type: array
          items:
            type: string
        expiry_days:
          type: integer
          minimum: 1
        metadata:
          type: object
          additionalProperties: true
      required: [subject_id, subject_type, credential_type, issuer_id]

    Credential:
      type: object
      properties:
        id:
          type: string
          format: uuid
        subject_id:
          type: string
        subject_type:
          type: string
        credential_type:
          $ref: "#/components/schemas/CredentialType"
        issuer_id:
          type: string
        is_valid:
          type: boolean
        issued_at:
          type: string
          format: date-time
        expires_at:
          type: string
          format: date-time
      required: [id, subject_id, subject_type, credential_type, issuer_id, is_valid, issued_at]

    CredentialVerificationResult:
      type: object
      properties:
        valid:
          type: boolean
        credential:
          $ref: "#/components/schemas/Credential"
        reason:
          type: string
      required: [valid]

    # ── Merchants ────────────────────────────────────────────────────────────
    MerchantCategory:
      type: string
      enum: [retail, food_beverage, healthcare, education, utilities, government, professional_services, transport, entertainment, ecommerce, other]

    CreateMerchantRequest:
      type: object
      properties:
        name:
          type: string
        handle:
          type: string
          pattern: "^[a-z0-9_-]+$"
          minLength: 2
          maxLength: 50
        owner_id:
          type: string
          format: uuid
        owner_type:
          type: string
          enum: [user, business]
        category:
          $ref: "#/components/schemas/MerchantCategory"
        country:
          type: string
          minLength: 2
          maxLength: 2
        contact_email:
          type: string
          format: email
        contact_phone:
          type: string
        business_registration_number:
          type: string
        website:
          type: string
          format: uri
        description:
          type: string
      required: [name, handle, owner_id, owner_type, category, country, contact_email, contact_phone]

    UpdateMerchantRequest:
      type: object
      properties:
        name:
          type: string
        category:
          $ref: "#/components/schemas/MerchantCategory"
        contact_email:
          type: string
          format: email
        contact_phone:
          type: string
        website:
          type: string
          format: uri
        description:
          type: string

    VerifyMerchantRequest:
      type: object
      properties:
        verified_by:
          type: string
        verification_notes:
          type: string
      required: [verified_by]

    SuspendMerchantRequest:
      type: object
      properties:
        reason:
          type: string
        suspended_by:
          type: string
      required: [reason, suspended_by]

    Merchant:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        handle:
          type: string
        owner_id:
          type: string
        owner_type:
          type: string
        category:
          $ref: "#/components/schemas/MerchantCategory"
        country:
          type: string
        contact_email:
          type: string
          format: email
        is_verified:
          type: boolean
        status:
          type: string
          enum: [active, suspended, pending]
        created_at:
          type: string
          format: date-time
      required: [id, name, handle, owner_id, owner_type, category, country, contact_email, is_verified, status, created_at]

    HandleAvailability:
      type: object
      properties:
        handle:
          type: string
        available:
          type: boolean
      required: [handle, available]

    PaginatedMerchants:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Merchant"
        pagination:
          $ref: "#/components/schemas/Pagination"
      required: [data, pagination]

    # ── Governance ───────────────────────────────────────────────────────────
    PolicyRule:
      type: object
      properties:
        condition:
          type: string
        action:
          type: string
          enum: [allow, deny, flag, review, throttle, log]
        priority:
          type: integer
          minimum: 1
          maximum: 1000
        metadata:
          type: object
          additionalProperties: true
      required: [condition, action, priority]

    CreatePolicyRequest:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        type:
          type: string
          enum: [enforcement, compliance, rate_limit, access_control, data_retention, fraud]
        scope:
          type: string
          enum: [global, country, institution, service]
        country:
          type: string
          minLength: 2
          maxLength: 2
        institution_id:
          type: string
          format: uuid
        service:
          type: string
        rules:
          type: array
          items:
            $ref: "#/components/schemas/PolicyRule"
        active:
          type: boolean
          default: true
        effective_from:
          type: string
          format: date-time
        effective_until:
          type: string
          format: date-time
      required: [name, type, scope, rules]

    UpdatePolicyRequest:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        rules:
          type: array
          items:
            $ref: "#/components/schemas/PolicyRule"
        active:
          type: boolean

    Policy:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        type:
          type: string
        scope:
          type: string
        rules:
          type: array
          items:
            $ref: "#/components/schemas/PolicyRule"
        active:
          type: boolean
        created_at:
          type: string
          format: date-time
      required: [id, name, type, scope, rules, active, created_at]

    ValidateActionRequest:
      type: object
      properties:
        action:
          type: string
        actor_id:
          type: string
          format: uuid
        actor_type:
          $ref: "#/components/schemas/EntityType"
        resource:
          type: string
        country:
          type: string
        institution_id:
          type: string
        context:
          type: object
          additionalProperties: true
      required: [action, actor_id, actor_type, resource]

    PolicyValidationResult:
      type: object
      properties:
        allowed:
          type: boolean
        policy_id:
          type: string
        action:
          type: string
        reason:
          type: string
      required: [allowed, action]

    CountryProfile:
      type: object
      properties:
        code:
          type: string
        name:
          type: string
        currency:
          type: string
        supported:
          type: boolean
        kyc_tiers:
          type: array
          items:
            type: string
        transaction_limits:
          type: object
          additionalProperties: true
      required: [code, name, currency, supported]

    CountryRules:
      type: object
      properties:
        code:
          type: string
        rules:
          type: array
          items:
            type: object
            properties:
              rule_type:
                type: string
              value:
                type: string
              description:
                type: string
      required: [code, rules]

    ComplianceRequirements:
      type: object
      properties:
        country:
          type: string
        requirements:
          type: array
          items:
            type: object
            properties:
              requirement:
                type: string
              mandatory:
                type: boolean
              description:
                type: string
      required: [country, requirements]

    ValidateTransactionRequest:
      type: object
      properties:
        amount:
          type: number
        currency:
          type: string
          minLength: 3
          maxLength: 3
        alias_type:
          type: string
        initiator_id:
          type: string
        recipient_id:
          type: string
      required: [amount, currency, alias_type, initiator_id, recipient_id]

    ComplianceCheckRequest:
      type: object
      properties:
        entity_id:
          type: string
          format: uuid
        entity_type:
          type: string
          enum: [user, business, merchant, bank, developer]
        country:
          type: string
          minLength: 2
          maxLength: 2
        action:
          type: string
        amount:
          type: number
        currency:
          type: string
          minLength: 3
          maxLength: 3
      required: [entity_id, entity_type, country, action]

    ComplianceCheckResult:
      type: object
      properties:
        compliant:
          type: boolean
        checks:
          type: array
          items:
            type: object
            properties:
              check:
                type: string
              passed:
                type: boolean
              reason:
                type: string
      required: [compliant, checks]

    ComplianceReport:
      type: object
      properties:
        id:
          type: string
        type:
          type: string
        country:
          type: string
        period_from:
          type: string
          format: date
        period_to:
          type: string
          format: date
        generated_at:
          type: string
          format: date-time
        data:
          type: object
          additionalProperties: true
      required: [id, type, generated_at]

    ComplianceFramework:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        countries:
          type: array
          items:
            type: string
      required: [id, name]

    PaginatedPolicies:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Policy"
        pagination:
          $ref: "#/components/schemas/Pagination"
      required: [data, pagination]

    # ── Audit ────────────────────────────────────────────────────────────────
    AuditEvent:
      type: object
      properties:
        id:
          type: string
        event_type:
          type: string
        actor_id:
          type: string
        actor_type:
          type: string
        target_id:
          type: string
        target_type:
          type: string
        metadata:
          type: object
          additionalProperties: true
        ip_address:
          type: string
        user_agent:
          type: string
        checksum:
          type: string
          description: SHA-256 checksum for tamper detection
        created_at:
          type: string
          format: date-time
      required: [id, event_type, metadata, checksum, created_at]

    PaginatedAuditEvents:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/AuditEvent"
        pagination:
          $ref: "#/components/schemas/Pagination"
      required: [data, pagination]

  responses:
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Unauthorized:
      description: Unauthorized — missing or invalid Bearer token
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Forbidden:
      description: Forbidden — insufficient permissions
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Conflict:
      description: Resource already exists
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    ValidationError:
      description: Validation error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    TooManyRequests:
      description: Rate limit exceeded
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
